<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Primary Meta Tags -->
    <title>Gati Music Distribution | Official Music Distribution Service India</title>
    <meta name="title" content="Gati Music Distribution | Official Music Distribution Service India" />
    <meta name="description" content="Official music distribution for independent artists. Release your songs on Spotify, Apple Music, and 250+ platforms. Fast review, 80% royalties, and dedicated support." />
    <meta name="keywords" content="gati music distribution, gati, music distribution india, release song on spotify, official music distribution, music metadata, royalties, spotify for artists india" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://www.gatimusic.in/" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/logo192.png" />
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.gatimusic.in/" />
    <meta property="og:site_name" content="Gati Music Distribution" />
    <meta property="og:title" content="Gati Music Distribution | India's Fastest Music Distributor" />
    <meta property="og:description" content="Release your music on Spotify, Apple Music & 250+ platforms with Gati Music Distribution. Official support and fast metadata review." />
    <meta property="og:image" content="https://www.gatimusic.in/logo512.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://www.gatimusic.in/" />
    <meta property="twitter:title" content="Gati Music Distribution | Music Distribution India" />
    <meta property="twitter:description" content="Release your songs on 250+ stores including Spotify and Apple Music with Gati. India's official music distributor." />
    <meta property="twitter:image" content="https://www.gatimusic.in/logo512.png" />

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "name": "Gati Music Distribution",
          "alternateName": "Gati",
          "url": "https://www.gatimusic.in",
          "logo": "https://www.gatimusic.in/logo512.png",
          "description": "Gati Music Distribution is India's fastest and most reliable distribution platform for independent artists.",
          "sameAs": [
            "https://www.instagram.com/gatimusic",
            "https://www.facebook.com/gatimusic",
            "https://twitter.com/gatimusic",
            "https://www.youtube.com/@gatimusic"
          ],
          "contactPoint": {
            "@type": "ContactPoint",
            "telephone": "+91-7626841258",
            "contactType": "customer service",
            "availableLanguage": ["English", "Hindi", "Punjabi"]
          }
        },
        {
          "@type": "WebSite",
          "name": "Gati Music Distribution",
          "url": "https://www.gatimusic.in",
          "potentialAction": {
            "@type": "SearchAction",
            "target": "https://www.gatimusic.in/search?q={search_term_string}",
            "query-input": "required name=search_term_string"
          }
        },
        {
           "@type": "Product",
           "name": "Basic Distribution Plan",
           "offers": {
             "@type": "Offer",
             "price": "75",
             "priceCurrency": "INR"
           }
        },
        {
           "@type": "Product",
           "name": "Monthly Distribution Plan",
           "offers": {
             "@type": "Offer",
             "price": "199",
             "priceCurrency": "INR"
           }
        },
        {
           "@type": "Product",
           "name": "Yearly Distribution Plan",
           "offers": {
             "@type": "Offer",
             "price": "999",
             "priceCurrency": "INR"
           }
        },
        {
          "@type": "FAQPage",
          "mainEntity": [
            {
              "@type": "Question",
              "name": "How to release music on Spotify in India?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "You can release your music on Spotify in India quickly by using Gati Music Distribution. Choose an affordable plan, upload your tracks, cover art, and metadata, and we will deliver it to Spotify and 250+ platforms worldwide."
              }
            },
            {
              "@type": "Question",
              "name": "How does Gati Music Distribution work?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Sign up, choose an affordable plan (Basic, Monthly, or Yearly), and upload your song. Our manual review team checks your release and sends it to worldwide streaming stores."
              }
            },
            {
              "@type": "Question",
              "name": "How long does release take?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Manual approval takes 7-8 hours, and your release will go live on platforms like Spotify and Apple Music in just 2-3 days."
              }
            },
            {
              "@type": "Question",
              "name": "How do royalties work?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Artists keep 80% of their royalties on all tiers. Your earnings are reported monthly directly within your artist dashboard."
              }
            },
            {
              "@type": "Question",
              "name": "How to withdraw earnings?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "You can withdraw your earnings directly to your bank account via the artist dashboard once the threshold is met."
              }
            }
          ]
        }
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
